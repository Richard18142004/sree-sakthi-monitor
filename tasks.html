<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sree Sakthi EMS — My Tasks</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="app-page">

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand-icon small">
        <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
          <rect width="12" height="12" rx="3" fill="currentColor"/>
          <rect x="16" width="12" height="12" rx="3" fill="currentColor" opacity="0.6"/>
          <rect y="16" width="12" height="12" rx="3" fill="currentColor" opacity="0.6"/>
          <rect x="16" y="16" width="12" height="12" rx="3" fill="currentColor"/>
        </svg>
      </div>
      <span class="brand-name">SREE SAKTHI EMS</span>
      <button class="sidebar-close" id="sidebarClose">×</button>
    </div>
    <div class="sidebar-user">
      <div class="avatar" id="userAvatar">?</div>
      <div>
        <div class="user-name" id="sidebarName">Loading…</div>
        <div class="user-role-badge emp" id="sidebarRoleBadge">Employee</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 20 20" fill="none"><path d="M3 10L10 3l7 7v7H3v-7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        Dashboard
      </a>
      <a href="tasks.html" class="nav-item active">
        <svg viewBox="0 0 20 20" fill="none"><path d="M4 5h12M4 10h8M4 15h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        My Tasks
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item logout-btn" id="logoutBtn">
        <svg viewBox="0 0 20 20" fill="none"><path d="M13 10H3m0 0l3-3m-3 3l3 3M8 5V3h9v14H8v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn">
        <svg viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div class="topbar-title">My Tasks</div>
      <div class="topbar-right">
        <div class="avatar sm" id="topAvatar">?</div>
      </div>
    </header>

    <main class="main-content">
      <div id="toast" class="toast hidden"></div>

      <!-- Filters -->
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="in-progress">In Progress</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
        <button class="filter-btn" data-filter="delayed">Delayed</button>
      </div>

      <div id="tasksLoading" class="loading-state"><div class="spinner"></div> Loading tasks…</div>
      <div id="tasksList" class="tasks-full-list hidden"></div>
      <div id="noTasks" class="empty-state hidden">
        <svg viewBox="0 0 40 40" fill="none" width="40"><rect x="6" y="4" width="28" height="34" rx="3" stroke="currentColor" stroke-width="1.5"/></svg>
        <p>No tasks found.</p>
      </div>
    </main>
  </div>
</div>

<!-- Task Detail / Update Modal -->
<div class="modal-overlay hidden" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Task Detail</h3>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body">
      <div id="modalContent"></div>

      <!-- Shop location link -->
      <div id="shopLocRow" class="detail-row hidden" style="margin:0.75rem 0">
        <span class="detail-label">Location</span>
        <a id="shopLocLink" href="#" target="_blank" style="color:var(--primary)">Open in Maps</a>
      </div>

      <div class="form-group" style="margin-top:1.5rem">
        <label>Update Status</label>
        <select id="modalStatus" class="select-field">
          <option value="pending">Pending</option>
          <option value="in-progress">In Progress</option>
          <option value="completed">Completed</option>
        </select>
      </div>

      <div class="form-group" id="proofGroup">
        <label>Upload Proof (Image)</label>
        <div class="file-upload-area" id="fileUploadArea">
          <svg viewBox="0 0 24 24" fill="none" width="32"><path d="M12 4v12m0-12l-3 3m3-3l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="currentColor" stroke-width="1.5"/></svg>
          <p>Click or drag image here</p>
          <input type="file" id="proofFile" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer"/>
        </div>
        <div id="proofPreview" class="proof-preview hidden"></div>
      </div>

      <div class="form-group">
        <label>Work Notes / Comments</label>
        <textarea id="modalNotes" class="textarea-field" rows="3" placeholder="Describe work done, issues found…"></textarea>
      </div>

      <div id="existingProof" class="hidden" style="margin-bottom:1rem">
        <label class="field-label">Existing Proof</label>
        <img id="existingProofImg" src="" alt="Proof" class="proof-img"/>
      </div>

      <!-- Location capture -->
      <div class="form-group">
        <label>Capture Work Location (optional)</label>
        <button type="button" class="btn-secondary" id="captureWorkLocBtn" style="width:100%">📍 Capture Current Location</button>
        <div id="workLocDisplay" style="font-size:12px;color:var(--text-muted);margin-top:4px"></div>
      </div>

      <button class="btn-primary btn-full" id="saveTaskBtn">
        <span id="saveBtnText">Save Changes</span>
        <span class="spinner hidden" id="saveSpinner"></span>
      </button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, where, updateDoc,
           serverTimestamp, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
  import { firebaseConfig } from "./app.js";

  const app     = initializeApp(firebaseConfig);
  const auth    = getAuth(app);
  const db      = getFirestore(app);
  const storage = getStorage(app);

  let allTasks     = [];
  let shopLocCache = {};      // shopLocationId → location data
  let currentFilter   = "all";
  let currentTaskId   = null;
  let capturedWorkLoc = null;

  function showToast(msg, type = "success") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = `toast ${type}`;
    setTimeout(() => t.classList.add("hidden"), 3500);
  }

  function statusBadge(status) {
    const map   = { pending:"badge-pending","in-progress":"badge-inprogress",completed:"badge-completed",delayed:"badge-delayed" };
    const label = { pending:"Pending","in-progress":"In Progress",completed:"Completed",delayed:"Delayed" };
    return `<span class="badge ${map[status]||'badge-pending'}">${label[status]||status}</span>`;
  }

  function isDelayed(t) {
    return t.status !== "completed" && t.deadline && new Date(t.deadline) < new Date();
  }

  function renderTasks(tasks) {
    const list  = document.getElementById("tasksList");
    const empty = document.getElementById("noTasks");
    if (!tasks.length) { empty.classList.remove("hidden"); list.classList.add("hidden"); return; }
    empty.classList.add("hidden"); list.classList.remove("hidden");
    list.innerHTML = tasks.map(t => {
      const effective = isDelayed(t) ? "delayed" : t.status;
      const dl = t.deadline ? new Date(t.deadline).toLocaleDateString() : "No deadline";
      return `<div class="task-row" data-id="${t.id}">
        <div class="task-row-main">
          <div class="task-row-title">${t.title}</div>
          <div class="task-row-desc">${t.description||""} ${t.taskType ? `· 🔧 ${t.taskType}` : ""}</div>
        </div>
        <div class="task-row-meta">
          <span class="task-deadline">📅 ${dl}</span>
          ${statusBadge(effective)}
          <button class="btn-icon" data-id="${t.id}">Update →</button>
        </div>
      </div>`;
    }).join("");

    list.querySelectorAll(".btn-icon").forEach(btn => {
      btn.addEventListener("click", () => openModal(btn.dataset.id));
    });
  }

  function applyFilter(filter) {
    currentFilter = filter;
    let filtered = allTasks;
    if (filter === "delayed")    filtered = allTasks.filter(t => isDelayed(t));
    else if (filter !== "all")   filtered = allTasks.filter(t => t.status === filter && !isDelayed(t));
    renderTasks(filtered);
  }

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      applyFilter(btn.dataset.filter);
    });
  });

  async function openModal(taskId) {
    const task = allTasks.find(t => t.id === taskId);
    if (!task) return;
    currentTaskId   = taskId;
    capturedWorkLoc = null;

    document.getElementById("modalTitle").textContent  = task.title;
    document.getElementById("modalStatus").value       = task.status;
    document.getElementById("modalNotes").value        = task.notes || "";
    document.getElementById("workLocDisplay").textContent = "";
    document.getElementById("captureWorkLocBtn").textContent = "📍 Capture Current Location";

    const dl = task.deadline ? new Date(task.deadline).toLocaleDateString() : "Not set";
    document.getElementById("modalContent").innerHTML = `
      <div class="detail-row"><span class="detail-label">Description</span><span>${task.description||"—"}</span></div>
      <div class="detail-row"><span class="detail-label">Type</span><span>${task.taskType||"general"}</span></div>
      <div class="detail-row"><span class="detail-label">Deadline</span><span>${dl}</span></div>
      <div class="detail-row"><span class="detail-label">Created</span><span>${task.createdAt?.toDate ? task.createdAt.toDate().toLocaleDateString() : "—"}</span></div>
    `;

    // Shop location link
    const shopLocRow = document.getElementById("shopLocRow");
    if (task.shopLocationId) {
      if (!shopLocCache[task.shopLocationId]) {
        try {
          const s = await getDoc(doc(db, "shopLocations", task.shopLocationId));
          if (s.exists()) shopLocCache[task.shopLocationId] = s.data();
        } catch(_) {}
      }
      const sl = shopLocCache[task.shopLocationId];
      if (sl) {
        document.getElementById("shopLocLink").textContent = sl.name + (sl.address ? ` — ${sl.address}` : "");
        document.getElementById("shopLocLink").href = sl.lat ? `https://maps.google.com/?q=${sl.lat},${sl.lng}` : "#";
        shopLocRow.classList.remove("hidden");
      } else shopLocRow.classList.add("hidden");
    } else shopLocRow.classList.add("hidden");

    if (task.proofUrl) {
      document.getElementById("existingProof").classList.remove("hidden");
      document.getElementById("existingProofImg").src = task.proofUrl;
    } else {
      document.getElementById("existingProof").classList.add("hidden");
    }
    document.getElementById("proofPreview").classList.add("hidden");
    document.getElementById("proofPreview").innerHTML = "";
    document.getElementById("proofFile").value = "";
    document.getElementById("taskModal").classList.remove("hidden");
  }

  document.getElementById("modalClose").addEventListener("click", () =>
    document.getElementById("taskModal").classList.add("hidden"));
  document.getElementById("taskModal").addEventListener("click", e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.add("hidden");
  });

  // Proof file preview
  document.getElementById("proofFile").addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const prev = document.getElementById("proofPreview");
      prev.innerHTML = `<img src="${ev.target.result}" alt="Preview"/>`;
      prev.classList.remove("hidden");
    };
    reader.readAsDataURL(file);
  });

  // Work location capture
  document.getElementById("captureWorkLocBtn").addEventListener("click", () => {
    if (!navigator.geolocation) { showToast("Geolocation not supported","error"); return; }
    document.getElementById("captureWorkLocBtn").textContent = "Getting…";
    navigator.geolocation.getCurrentPosition(pos => {
      capturedWorkLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      document.getElementById("workLocDisplay").textContent =
        `📍 ${capturedWorkLoc.lat.toFixed(5)}, ${capturedWorkLoc.lng.toFixed(5)}`;
      document.getElementById("captureWorkLocBtn").textContent = "📍 Location Captured ✓";
    }, () => {
      showToast("Could not get location","error");
      document.getElementById("captureWorkLocBtn").textContent = "📍 Capture Current Location";
    });
  });

  // Save task update
  document.getElementById("saveTaskBtn").addEventListener("click", async () => {
    if (!currentTaskId) return;
    const status = document.getElementById("modalStatus").value;
    const notes  = document.getElementById("modalNotes").value.trim();
    const file   = document.getElementById("proofFile").files[0];

    document.getElementById("saveBtnText").classList.add("hidden");
    document.getElementById("saveSpinner").classList.remove("hidden");

    try {
      const updates = { status, notes, updatedAt: serverTimestamp() };
      if (capturedWorkLoc) updates.lastWorkLocation = capturedWorkLoc;
      if (file) {
        const storageRef = ref(storage, `proofs/${currentTaskId}_${Date.now()}`);
        await uploadBytes(storageRef, file);
        updates.proofUrl = await getDownloadURL(storageRef);
      }
      await updateDoc(doc(db, "tasks", currentTaskId), updates);
      showToast("Task updated successfully!");
      document.getElementById("taskModal").classList.add("hidden");
    } catch (err) {
      showToast("Failed to update: " + err.message, "error");
    } finally {
      document.getElementById("saveBtnText").classList.remove("hidden");
      document.getElementById("saveSpinner").classList.add("hidden");
    }
  });

  // Auth & data
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    const snap = await getDoc(doc(db, "users", user.uid));
    if (!snap.exists()) { window.location.href = "login.html"; return; }

    const role = snap.data().role;
    if (["admin","manager","service_manager"].includes(role)) {
      window.location.href = role === "admin" ? "admin.html" : "dashboard.html"; return;
    }

    const name = snap.data().name || "Employee";
    document.getElementById("sidebarName").textContent      = name;
    document.getElementById("sidebarRoleBadge").textContent = role;
    document.getElementById("userAvatar").textContent       = name[0].toUpperCase();
    document.getElementById("topAvatar").textContent        = name[0].toUpperCase();

    const q = query(collection(db, "tasks"), where("assignedTo", "==", user.uid));
    onSnapshot(q, snapshot => {
      document.getElementById("tasksLoading").classList.add("hidden");
      allTasks = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a,b) => (b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      applyFilter(currentFilter);
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login.html";
    });
    document.getElementById("menuBtn").addEventListener("click",      () => document.getElementById("sidebar").classList.add("open"));
    document.getElementById("sidebarClose").addEventListener("click", () => document.getElementById("sidebar").classList.remove("open"));
  });
</script>
</body>
</html>
