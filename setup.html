<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sree Sakthi EMS — Setup Users</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    .setup-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; background: var(--bg); }
    .setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 480px; box-shadow: 0 8px 40px rgba(0,0,0,0.08); }
    .setup-title { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--text); margin-bottom: .25rem; }
    .setup-sub { color: var(--text-muted); font-size: .9rem; margin-bottom: 2rem; }
    .user-list { margin-top: 2rem; display: flex; flex-direction: column; gap: .75rem; }
    .user-item { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1rem; background: var(--bg); border-radius: 12px; border: 1px solid var(--border); font-size: .88rem; }
    .user-item .role-chip { font-size: .75rem; font-weight: 600; border-radius: 20px; padding: 2px 10px; background: #6366f120; color: #6366f1; }
    .user-item .status-ok  { color: #16a34a; font-size: .8rem; font-weight: 600; }
    .user-item .status-err { color: #dc2626; font-size: .8rem; font-weight: 600; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.75rem 0; }
    .bulk-note { font-size: .82rem; color: var(--text-muted); margin-bottom: 1rem; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); border-radius: 10px; padding: .65rem 1.25rem; font-size: .9rem; font-weight: 600; cursor: pointer; transition: border-color .2s, color .2s; }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .progress-bar-wrap { height: 4px; border-radius: 2px; background: var(--border); margin-top: 1rem; overflow: hidden; display: none; }
    .progress-bar { height: 100%; background: var(--primary); border-radius: 2px; transition: width .3s; width: 0; }
  </style>
</head>
<body>
<div class="setup-wrap">
  <div class="setup-card">
    <div class="setup-title">User Setup</div>
    <div class="setup-sub">Create & register employees in Firebase Auth + Firestore.</div>

    <div id="toast" class="toast hidden"></div>

    <!-- SINGLE USER FORM -->
    <div class="form-group">
      <label>Full Name *</label>
      <input type="text" id="uName" class="input-field" placeholder="e.g. Ravi Kumar"/>
      <span class="field-error" id="nameErr"></span>
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="uEmail" class="input-field" placeholder="ravi@sreesakthiauto.com"/>
      <span class="field-error" id="emailErr"></span>
    </div>
    <div class="form-group">
      <label>Password * <span style="color:var(--text-muted);font-size:.8rem">(min 6 chars)</span></label>
      <input type="password" id="uPass" class="input-field" placeholder="••••••••"/>
      <span class="field-error" id="passErr"></span>
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="tel" id="uPhone" class="input-field" placeholder="+91 9876543210"/>
    </div>
    <div class="form-group">
      <label>Role *</label>
      <select id="uRole" class="select-field">
        <option value="">Select role…</option>
        <option value="admin">Admin</option>
        <option value="manager">Manager</option>
        <option value="service_manager">Service Manager</option>
        <option value="mechanic">Mechanic</option>
        <option value="salesman">Salesman</option>
      </select>
      <span class="field-error" id="roleErr"></span>
    </div>

    <button class="btn-primary btn-full" id="createBtn">
      <span id="createText">Create User</span>
      <span class="spinner hidden" id="createSpinner"></span>
    </button>

    <hr class="divider"/>

    <!-- BULK SETUP -->
    <div class="bulk-note">Need to create all demo accounts at once?</div>
    <button class="btn-outline btn-full" id="bulkBtn">
      <span id="bulkText">Create All Demo Accounts</span>
      <span class="spinner hidden" id="bulkSpinner"></span>
    </button>
    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- RESULT LIST -->
    <div class="user-list" id="resultList"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { firebaseConfig } from "./app.js";

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const DEPT_MAP = {
    admin: "Management", manager: "Management",
    service_manager: "Service", mechanic: "Workshop", salesman: "Sales"
  };

  const DEMO_USERS = [
    { name:"Admin User",       email:"admin@sreesakthiauto.com",   pass:"Admin@123",  role:"admin" },
    { name:"Manager Name",     email:"manager@sreesakthiauto.com", pass:"Mgr@1234",   role:"manager" },
    { name:"Service Manager",  email:"svc@sreesakthiauto.com",     pass:"Svc@1234",   role:"service_manager" },
    { name:"Mechanic One",     email:"mech1@sreesakthiauto.com",   pass:"Mech@1234",  role:"mechanic" },
    { name:"Salesman One",     email:"sales1@sreesakthiauto.com",  pass:"Sales@1234", role:"salesman" },
  ];

  function showToast(msg, type="success") {
    const t = document.getElementById("toast");
    t.textContent = msg; t.className = `toast ${type}`;
    setTimeout(() => t.classList.add("hidden"), 4000);
  }

  function setLoading(btnId, spinnerId, on) {
    document.getElementById(btnId).classList.toggle("hidden", on);
    document.getElementById(spinnerId).classList.toggle("hidden", !on);
  }

  async function createUser(name, email, pass, role, phone = "") {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await setDoc(doc(db, "users", cred.user.uid), {
      name, email, phone, role,
      department: DEPT_MAP[role] || "General",
      createdAt: serverTimestamp()
    });
    return cred.user.uid;
  }

  // Single user creation
  document.getElementById("createBtn").addEventListener("click", async () => {
    const name  = document.getElementById("uName").value.trim();
    const email = document.getElementById("uEmail").value.trim();
    const pass  = document.getElementById("uPass").value;
    const role  = document.getElementById("uRole").value;
    const phone = document.getElementById("uPhone").value.trim();

    let valid = true;
    const check = (id, errId, msg) => { if (!id) { document.getElementById(errId).textContent = msg; valid = false; } else document.getElementById(errId).textContent = ""; };
    check(name,  "nameErr",  "Name is required");
    check(email, "emailErr", "Email is required");
    check(pass.length >= 6 ? pass : "", "passErr", "Password must be at least 6 characters");
    check(role,  "roleErr",  "Select a role");
    if (!valid) return;

    setLoading("createText", "createSpinner", true);
    try {
      await createUser(name, email, pass, role, phone);
      showToast(`✅ ${name} created as ${role}`, "success");
      ["uName","uEmail","uPass","uPhone"].forEach(id => document.getElementById(id).value = "");
      document.getElementById("uRole").value = "";
    } catch(err) {
      const msg = err.code === "auth/email-already-in-use"
        ? "Email already registered." : err.message;
      showToast("❌ " + msg, "error");
    } finally {
      setLoading("createText", "createSpinner", false);
    }
  });

  // Bulk demo accounts
  document.getElementById("bulkBtn").addEventListener("click", async () => {
    setLoading("bulkText", "bulkSpinner", true);
    const wrap = document.getElementById("progressWrap");
    const bar  = document.getElementById("progressBar");
    const list = document.getElementById("resultList");
    wrap.style.display = "block";
    list.innerHTML = "";
    const total = DEMO_USERS.length;

    for (let i = 0; i < total; i++) {
      const u = DEMO_USERS[i];
      const item = document.createElement("div");
      item.className = "user-item";
      let statusHTML = "";
      try {
        await createUser(u.name, u.email, u.pass, u.role);
        statusHTML = `<span class="status-ok">✅ Created</span>`;
      } catch(err) {
        const msg = err.code === "auth/email-already-in-use" ? "Already exists" : "Error";
        statusHTML = `<span class="status-err">⚠️ ${msg}</span>`;
      }
      item.innerHTML = `
        <div>
          <div style="font-weight:600;color:var(--text)">${u.name}</div>
          <div style="color:var(--text-muted);font-size:.8rem">${u.email}</div>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <span class="role-chip">${u.role}</span>
          ${statusHTML}
        </div>`;
      list.appendChild(item);
      bar.style.width = `${((i+1)/total)*100}%`;
    }

    setLoading("bulkText", "bulkSpinner", false);
    showToast("Bulk setup complete!", "success");
  });
</script>
</body>
</html>
