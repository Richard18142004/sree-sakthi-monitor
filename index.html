<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sree Sakthi Automobiles EMS — Login</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="login-page">

  <div class="login-bg">
    <div class="login-grid"></div>
    <div class="login-blob blob-1"></div>
    <div class="login-blob blob-2"></div>
  </div>

  <div class="login-container">
    <div class="login-brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="12" height="12" rx="3" fill="currentColor"/>
          <rect x="16" width="12" height="12" rx="3" fill="currentColor" opacity="0.6"/>
          <rect y="16" width="12" height="12" rx="3" fill="currentColor" opacity="0.6"/>
          <rect x="16" y="16" width="12" height="12" rx="3" fill="currentColor"/>
        </svg>
      </div>
      <span class="brand-name">SREE SAKTHI EMS</span>
    </div>

    <div class="login-card">
      <div class="login-card-header">
        <h1>Welcome back</h1>
        <p>Sign in to your workspace</p>
      </div>

      <div id="toast" class="toast hidden"></div>

      <form id="loginForm" class="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 20 20" fill="none">
              <path d="M2 5a2 2 0 012-2h12a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V5z" stroke="currentColor" stroke-width="1.5"/>
              <path d="M2 7l8 5 8-5" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required/>
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 20 20" fill="none">
              <rect x="3" y="8" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M7 8V6a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="10" cy="13" r="1.5" fill="currentColor"/>
            </svg>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
            <button type="button" class="toggle-pw" id="togglePw" title="Show/hide password">
              <svg viewBox="0 0 20 20" fill="none">
                <path d="M10 4C5 4 1.5 10 1.5 10S5 16 10 16s8.5-6 8.5-6S15 4 10 4z" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="pwError"></span>
        </div>
        <button type="submit" class="btn-primary btn-full" id="loginBtn">
          <span id="loginBtnText">Sign in</span>
          <span id="loginSpinner" class="spinner hidden"></span>
        </button>
      </form>

   </div>

    <p class="login-footer">© 2025 Sree Sakthi Automobiles. All rights reserved.</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { firebaseConfig, ROLE_REDIRECT } from "./app.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // Redirect if already logged in
    onAuthStateChanged(auth, async (user) => {
      if (!user) return;
      try {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) {
          const role = snap.data().role;
          window.location.href = ROLE_REDIRECT[role] || "dashboard.html";
        }
      } catch (_) {}
    });

    function showToast(msg, type = "error") {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = `toast ${type}`;
      setTimeout(() => t.classList.add("hidden"), 4000);
    }

    function setLoading(on) {
      document.getElementById("loginBtnText").classList.toggle("hidden", on);
      document.getElementById("loginSpinner").classList.toggle("hidden", !on);
      document.getElementById("loginBtn").disabled = on;
    }

    // Demo fill
    document.querySelectorAll(".demo-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.getElementById("email").value = btn.dataset.email;
        document.getElementById("password").value = btn.dataset.pass;
      });
    });

    // Toggle password visibility
    document.getElementById("togglePw").addEventListener("click", () => {
      const pw = document.getElementById("password");
      pw.type = pw.type === "password" ? "text" : "password";
    });

    // Login submit
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      let valid = true;
      if (!email)    { document.getElementById("emailError").textContent = "Email is required"; valid = false; }
      else             document.getElementById("emailError").textContent = "";
      if (!password) { document.getElementById("pwError").textContent = "Password is required"; valid = false; }
      else             document.getElementById("pwError").textContent = "";
      if (!valid) return;

      setLoading(true);
      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const snap = await getDoc(doc(db, "users", cred.user.uid));
        if (!snap.exists()) throw new Error("User record not found.");

        const role = snap.data().role;
        const dest  = ROLE_REDIRECT[role] || "dashboard.html";
        showToast("Login successful! Redirecting…", "success");
        setTimeout(() => { window.location.href = dest; }, 800);
      } catch (err) {
        let msg = "Login failed. Please try again.";
        if (["auth/user-not-found","auth/wrong-password","auth/invalid-credential"].includes(err.code))
          msg = "Invalid email or password.";
        else if (err.code === "auth/too-many-requests")
          msg = "Too many attempts. Please wait a moment.";
        showToast(msg);
        setLoading(false);
      }
    });
  </script>
</body>
</html>
